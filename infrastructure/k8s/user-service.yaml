apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        version: v1
    spec:
      containers:
      - name: user-service
        image: enterprise-app-user:latest # Placeholder
        ports:
        - containerPort: 3000
        env:
        - name: DB_HOST
          value: "rds-endpoint-placeholder"
        - name: DB_PORT
          value: "5432"
        - name: KAFKA_BROKERS
          value: "msk-endpoint-placeholder:9092"
        - name: DB_USER
          value: "dbadmin"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: db-password
        - name: DB_NAME
          value: "appdb"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
